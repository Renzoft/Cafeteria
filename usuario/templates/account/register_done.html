{% extends "base.html" %}
{% block title %}Registro completado{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow border-0 rounded-4 text-center">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <i class="fas fa-check-circle text-success" style="font-size: 5rem;"></i>
                    </div>
                    <h1 class="h3 mb-3 font-weight-normal" style="color: #4a3b32;">¡Bienvenido, {{ new_user.first_name }}!</h1>
                    <p class="text-muted mb-4">
                        Tu cuenta ha sido creada exitosamente. Estamos encantados de tenerte en Rico Destino.
                    </p>
                    <a href="{% url 'login' %}" class="btn btn-primary btn-lg w-100 rounded-pill" style="background-color: #8b5e3c; border-color: #8b5e3c; transition: background-color 0.3s ease;">
                        Iniciar Sesión Ahora
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
